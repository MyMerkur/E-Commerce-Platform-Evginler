# evginlerevtekstil.com — Mağaza (evginler-store-client build çıktısı)
# Kurulum: bu dosyayı /etc/nginx/sites-available/store.conf olarak kopyalayıp
# /etc/nginx/sites-enabled/ altına symlink oluşturun, sonra `nginx -t && systemctl reload nginx`.
# APP_ROOT'u projenin VPS'teki gerçek yoluyla değiştirin (örn: /var/www/evginler).

server {
    listen 80;
    listen [::]:80;
    server_name evginlerevtekstil.com www.evginlerevtekstil.com;

    root /var/www/evginler/evginler-store-client/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # certbot --nginx bu bloğu otomatik ekleyip 443/SSL yönlendirmesi kuracaktır.
}
