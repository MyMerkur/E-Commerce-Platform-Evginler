# admin.evginlerevtekstil.com — Admin Panel (evginler-admin-client build çıktısı)
# APP_ROOT'u projenin VPS'teki gerçek yoluyla değiştirin (örn: /var/www/evginler).

server {
    listen 80;
    listen [::]:80;
    server_name admin.evginlerevtekstil.com;

    root /var/www/evginler/evginler-admin-client/dist;
    index index.html;

    add_header X-Robots-Tag "noindex, nofollow" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # certbot --nginx bu bloğu otomatik ekleyip 443/SSL yönlendirmesi kuracaktır.
}
